name: Wart — wöchentlicher Research-Lauf

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: wart-research
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  wart:
    name: Der Wart recherchiert
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r gremium/requirements.txt

      - name: Wart-Lauf (Fable + Web-Suche)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          python3 gremium/run_wart.py 2>&1 | tee run.log

      - name: Commit Journal & schedule
        run: |
          git config user.name "noblecause-wart"
          git config user.email "wart@noblecause.ai"
          git add journal/ schedule.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen zum Committen."
            exit 0
          fi
          git commit -m "journal: Wart-Eintrag $(date -u +%Y-%m-%d)"
          git push

      - name: Rohantwort sichern (bei Fehlschlag)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wart-raw-${{ github.run_id }}
          path: |
            journal/
            run.log
          retention-days: 30
          if-no-files-found: warn

      - name: Fehler als Issue melden
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="ci-failure:wart"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create "$LABEL" --color B60205 --description "Automatischer CI-Fehler" 2>/dev/null || true
          TAIL=$(tail -c 3000 run.log 2>/dev/null || echo "(kein Log erfasst)")
          BODY=$(printf '**Wart-Lauf fehlgeschlagen:** %s\n\n```\n%s\n```' "$RUN_URL" "$TAIL")
          NUM=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "CI-Fehler: Wart-Lauf" --label "$LABEL" --body "$BODY"
          fi
