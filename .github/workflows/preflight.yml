name: Preflight — Key-Canary

# Täglicher Canary: prüft, dass ANTHROPIC/OPENAI/GEMINI-Secrets gesetzt und live
# erreichbar sind — BEVOR ein echter Wart- oder Session-Lauf am Key scheitert.
# Schlägt der Canary fehl, wird ein Issue angelegt/aktualisiert.

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    name: Key-Canary (3 Anbieter)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r gremium/requirements.txt

      - name: Canary (minimaler Live-Call je Anbieter)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -o pipefail
          python3 gremium/preflight.py 2>&1 | tee run.log

      - name: Fehler als Issue melden
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="ci-failure:preflight"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create "$LABEL" --color B60205 --description "Automatischer CI-Fehler" 2>/dev/null || true
          TAIL=$(tail -c 3000 run.log 2>/dev/null || echo "(kein Log erfasst)")
          BODY=$(printf '**Canary fehlgeschlagen** (mind. ein Key fehlt/leer oder Anbieter nicht erreichbar): %s\n\n```\n%s\n```' "$RUN_URL" "$TAIL")
          NUM=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "CI-Fehler: Key-Canary (preflight)" --label "$LABEL" --body "$BODY"
          fi
