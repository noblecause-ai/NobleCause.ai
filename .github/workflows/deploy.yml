name: Deploy noblecause.ai (static)

# Static-site deploy, pattern borrowed from aion-lumen.com: push to master ->
# build the SvelteKit static site in the runner -> rsync the build output to
# the VPS directory that Caddy serves. No service restart, no health check
# needed — Caddy serves files, nothing runs.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & sync static site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Setup SSH agent (dedicated deploy key)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        run: ssh-keyscan -H 185.143.100.222 >> ~/.ssh/known_hosts

      - name: Deploy (rsync build output, NO --delete in v1)
        run: |
          rsync -avz site/build/ noblecause@185.143.100.222:/srv/noblecause/
          # --delete intentionally off in v1 (never removes stray files).
          # To tighten later: dry-run first with -avzn --delete, then enable.
