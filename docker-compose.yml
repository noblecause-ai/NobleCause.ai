services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: noblecause-postgres
    environment:
      POSTGRES_DB: noblecause
      POSTGRES_USER: noblecause
      POSTGRES_PASSWORD: noblecause_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noblecause -d noblecause"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noblecause-network

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: noblecause-chromadb
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noblecause-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noblecause-backend
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql://noblecause:noblecause_password@postgres:5432/noblecause
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - noblecause-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noblecause-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - noblecause-network
    restart: unless-stopped

# Persistent volumes for data storage
volumes:
  postgres_data:
    driver: local
  chromadb_data:
    driver: local

# Network for service communication
networks:
  noblecause-network:
    driver: bridge